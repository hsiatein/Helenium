[workspace]
members = ["heleny-bus","heleny-kernel", "heleny-macros", "heleny-proto", "heleny-server", "heleny-service", "service-config", "service-fs"]

[workspace.dependencies]
serde = "1.0.228"
serde_json = "1.0.145"
tokio = {version = "1.48.0", features = ["macros", "time","rt-multi-thread","sync"]}
dotenvy = "0.15.7"
inventory = "0.3.21"
iced = "0.14.0"
async-trait = "0.1.89"
anyhow = "1.0.100"
uuid = { version = "1.19.0", features = ["v4"] }
toml = "0.9.8"
